<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncHealth - Forgot Password</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="theme-toast" class="theme-toast">Dark Mode Enabled 🌙</div>
    <button id="theme-toggle" class="theme-toggle-btn" style="position: absolute; top: 20px; right: 20px; z-index: 100;" title="Toggle Dark/Light Mode">
        <span id="theme-icon">🌙</span>
    </button>

    <div class="login-container">
        <div class="info-panel">
            <h1>Forgot Password</h1>
            <p>Verify your identity to reset your password.</p>
        </div>

        <div class="form-panel">
            <div class="form-content">
                <h2>Reset Password</h2>
                
                <form id="forgot-password-form" onsubmit="event.preventDefault(); alert('Password successfully updated! Proceeding to login...'); window.location.href='index.html';">
                    <div class="input-group">
                        <label for="email">Your Email Address</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="input-group">
                        <label for="secret_answer">Your Secret Answer</label>
                        <input type="text" id="secret_answer" required>
                    </div>
                    <div class="input-group">
                        <label for="new_password">New Password</label>
                        <input type="password" id="new_password" required>
                    </div>
                    <div class="input-group">
                        <label for="confirm_password">Confirm New Password</label>
                        <input type="password" id="confirm_password" required>
                    </div>
                    
                    <button type="submit" class="login-button">Update Password</button>
                </form>

                <div class="signup-prompt">
                    <p>Remembered it? <a href="index.html">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
